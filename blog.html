<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Org & Aura | Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="glass">
    <div class="nav-wrap">
      <div class="brand">
        <img src="WhatsApp Image 2026-04-26 at 3.11.47 PM.jpeg" alt="Org and Aura logo" />
        <div>
          <h1>Org & Aura</h1>
          <span>Blog</span>
        </div>
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="product.html">Product</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a class="active" href="blog.html">Blog</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="userInfo" style="font-size:13px;"></span>
        <button id="loginBtn" class="btn btn-outline" onclick="handleLogin()">Sign in with Google</button>
      </div>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h2 class="section-title">Blog</h2>
        <p class="section-copy">Latest updates from Org & Aura.</p>
        <div id="writePost" style="display:none; margin-bottom:28px;">
          <article class="panel glass">
            <h3>Write a Blog Post</h3>
            <form id="userBlogForm">
              <input id="userBlogTitle" type="text" placeholder="Title" required />
              <input id="userBlogDate" type="date" required />
              <textarea id="userBlogContent" placeholder="Write your post..." required></textarea>
              <button class="btn btn-primary" type="submit">Publish</button>
            </form>
            <p id="userBlogStatus"></p>
          </article>
        </div>
        <div id="blogList" class="blog-list"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 Org & Aura Private Limited. All rights reserved.</p>
    </div>
  </footer>
  <script type="module" src="site.js"></script>
</body>

</html>
